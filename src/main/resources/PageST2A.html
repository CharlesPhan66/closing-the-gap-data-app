<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subtask 2.1</title>
    <link rel="stylesheet" type="text/css" href="common.css" />
</head>
<body>
    <div class='topnav'>
        <a href='/'>Homepage</a>
        <a href='mission.html'>Our Mission</a>
        <a href='page2A.html'>Age and Health Conditions</a>
        <a href='page2B.html'>School and Non-School completion</a>
        <a href='page3A.html'>Sub Task 3.A</a>
        <a href='page3B.html'>Sub Task 3.B</a>
    </div>
    <div class='header'>
        <h1>Subtask 2.A</h1>
    </div>
    <div class='content'>
        <h2>Filters</2>
        
        <form id="submitStateForm" method="POST" action="/page2A.html">
            <label for="targetState">State:</label>
            <select name="targetState" id="targetState">
                <option value="none" th:selected="${selectedState == null or selectedState == 'none'}">-- Select State --</option>
                <th:block th:each="state : ${states}">
                    <option th:value="${state.code}"
                            th:text="${state.name}"
                            th:selected="${state.code.toString() == selectedState}">
                    </option>
                </th:block>
            </select>
        </form>

        <div th:if = "${selectedState} != null">
        <form id="submitYearForm" method="POST" action="/page2A.html">
            <label for="targetYear">Year:</label>
            <input type="hidden" name="targetState" th:value="${selectedState}" />
            <select name="targetYear" id="targetYear">
                <option value="none" th:selected="${selectedYear == null or selectedYear == 'none'}">-- Select Year --</option>
                <!-- <option value="2016" th:selected="${selectedYear == '2016'}">2016</option> -->
                <option value="2021" th:selected="${selectedYear == '2021'}">2021</option>
            </select>
        </form>
        </div>

        <div th:if = "(selectedState != null) and (selectedYear != null)">
        <form method="POST" action="/page2A.html">
            <div style="margin-bottom: 1em;">
                <label><b>Mode:</b></label>
                <input type="radio" id="detailMode" name="mode" value="detail" th:checked="${mode == null or mode == 'detail'}">
                <label for="detailMode">Detail</label>
                <input type="radio" id="summaryMode" name="mode" value="summary" th:checked="${mode == 'summary'}">
                <label for="summaryMode">Summary</label>
            </div>
            <input type="hidden" name="targetState" th:value="${selectedState}" />
            <input type="hidden" name="targetYear" th:value="${selectedYear}" />
            <div>
                <label for="targetLGA">LGA:</label>
                <select name="targetLGA" id="targetLGA">
                    <option value="none" th:selected="${selectedLGA == null or selectedLGA == 'none'}">-- Select LGA --</option>
                   <option  th:each = "lga: ${lgasInState}"
                            th:text = "${lga.name}" 
                            th:value = "${lga.code}"
                            th:selected = "${lga.code == selectedLGA}">
                   </option>
                </select>
            </div>
            <div>
                <label for="targetStatus">Indigenous Status:</label>
                <select name="targetStatus" id="targetStatus">
                    <option value="none" th:selected="${selectedStatus == null or selectedStatus == 'none'}">-- Select Status --</option>
                    <th:block th:each="status : ${statusList}">
                        <option th:value="${status.statusID}"
                                th:text="${status.statusName}"
                                th:selected="${status.statusID == selectedStatus}"></option>
                    </th:block>
                </select>
            </div>

            <div>
                <label for="targetGender">Gender:</label>
                <select name="targetGender" id="targetGender">
                    <option value="none" th:selected="${selectedGender == null or selectedGender == 'none'}">-- Select Gender --</option>
                    <th:block th:each="gender : ${genders}">
                        <option th:value="${gender.sexID}"
                                th:text="${gender.sex}"
                                th:selected="${gender.sexID == selectedGender}"></option>
                    </th:block>
                </select>
            </div>
            <div>
                <label for="targetCondition">Health Condition:</label>
                <select name="targetCondition" id="targetCondition">
                    <option value="none" th:selected="${selectedCondition == null or selectedCondition == 'none'}">-- Select Condition --</option>
                    <th:block th:each="condition : ${conditions}">
                        <option th:value="${condition.conditionID}"
                                th:text="${condition.diseaseName}"
                                th:selected="${condition.conditionID == selectedCondition}"></option>
                    </th:block>
                </select>
            </div>
            <div>
                <button type="submit">Filter</button>
            </div>
        </form>
        </div>
            <div>
                <h2>Health Data</h2>
                <div th:if="${healthList == null or healthList.isEmpty()}">
                    <p>Please select all filters and click Filter to view health data.</p>
                </div>
                <div th:if="${healthList != null and !healthList.isEmpty()}">
                    <table border="1" cellpadding="6" cellspacing="0">
                        <thead>
                            <tr>
                                <th th:if="${healthList[0].lgaName != null}">LGA Name</th>
                                <th th:if="${healthList[0].sex != null}">Sex</th>
                                <th th:if="${healthList[0].status != null}">Status</th>
                                <th th:if="${healthList[0].disease != null}">Disease</th>
                                <th>Population Value</th>
                            </tr>
                        </thead>
                        <tbody>
                            <th:block th:each="h : ${healthList}">
                                <tr>
                                    <td th:if="${h.lgaName != null}" th:text="${h.lgaName}"></td>
                                    <td th:if="${h.sex != null}" th:text="${h.sex}"></td>
                                    <td th:if="${h.status != null}" th:text="${h.status}"></td>
                                    <td th:if="${h.disease != null}" th:text="${h.disease}"></td>
                                    <td th:text="${h.populationValue}"></td>
                                </tr>
                            </th:block>
                        </tbody>
                    </table>
                </div>
            </div>
    </div>
    <script>
    // Auto-submit State form on change
    document.addEventListener('DOMContentLoaded', function() {
        var stateSelect = document.getElementById('targetState');
        if(stateSelect) {
            stateSelect.addEventListener('change', function() {
                this.form.submit();
            });
        }
        var yearSelect = document.getElementById('targetYear');
        if(yearSelect) {
            yearSelect.addEventListener('change', function() {
                this.form.submit();
            });
        }
    });
    </script>
    <div class='footer'>
        <p>COSC3056 - Studio Project Starter Code</p>
    </div>
</body>
</html>
