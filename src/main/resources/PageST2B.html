<!DOCTYPE html>
<html>
<head>
    <title>School and Non-School completion by LGA or State in 2021</title>
    <link rel='stylesheet' type='text/css' href='common.css' />
</head>
<body>
    <div class='topnav'>
        <a href='/'>Homepage</a>
        <a href='mission.html'>Our Mission</a>
        <a href='page2A.html'>Age and Health Conditions</a>
        <a href='page2B.html'>School and Non-School Completion</a>
        <a href='page3A.html'>Status Gap</a>
        <a href='page3B.html'>LGA Similarity</a>
    </div>
    <div class='header'>
        <h1>Subtask 2.B</h1>
    </div>
    <div class='content'>
        <!-- Only show the next dropdown when the previous selection is made -->
        <form id="stateForm" method="POST" action="/page2B.html">
            <label for="targetState">State:</label>
            <select name="targetState" id="targetState" onchange="this.form.submit()">
                <option value="none" th:selected="${selectedState == null or selectedState == 'none'}">-- Select State --</option>
                <th:block th:each="state : ${states}">
                    <option th:value="${state.code}"
                            th:text="${state.name}"
                            th:selected="${state.code == selectedState}"></option>
                </th:block>
            </select>
        </form>

        <div th:if="${selectedState != null and selectedState != 'none'}">
            <form id="yearForm" method="POST" action="/page2B.html">
                <input type="hidden" name="targetState" th:value="${selectedState}" />
                <label for="targetYear">Year:</label>
                <select name="targetYear" id="targetYear" onchange="this.form.submit()">
                    <option value="none" th:selected="${selectedYear == null or selectedYear == 'none'}">-- Select Year --</option>
                    <option value="2016" th:selected="${selectedYear == '2016'}">2016</option>
                    <option value="2021" th:selected="${selectedYear == '2021'}">2021</option>
                </select>
            </form>
        </div>

        <div th:if="${selectedState != null and selectedState != 'none' and selectedYear != null and selectedYear != 'none'}">
            <form id="lgaForm" method="POST" action="/page2B.html">
                <input type="hidden" name="targetState" th:value="${selectedState}" />
                <input type="hidden" name="targetYear" th:value="${selectedYear}" />
                <label for="targetLGA">LGA:</label>
                <select name="targetLGA" id="targetLGA" onchange="this.form.submit()">
                    <option value="none" th:selected="${selectedLGA == null or selectedLGA == 'none'}">-- Select LGA --</option>
                    <th:block th:each="lga : ${lgasInState}">
                        <option th:value="${lga.code}"
                                th:text="${lga.name}"
                                th:selected="${lga.code == selectedLGA}"></option>
                    </th:block>
                </select>
            </form>
        </div>

        <!-- Continue with the rest of your filters in a final form -->
        <div th:if="${selectedState != null and selectedState != 'none' 
                    and selectedYear != null and selectedYear != 'none' 
                    and selectedLGA != null and selectedLGA != 'none'}">
            <form id="filterForm" method="POST" action="/page2B.html">
                <input type="hidden" name="targetState" th:value="${selectedState}" />
                <input type="hidden" name="targetYear" th:value="${selectedYear}" />
                <input type="hidden" name="targetLGA" th:value="${selectedLGA}" />

                <label for="targetEduType">Education Type:</label>
                <select name="targetEduType" id="targetEduType" onchange="this.form.submit()">
                    <option value="none" th:selected="${selectedEduType == null or selectedEduType == 'none'}">-- Select Type --</option>
                    <option value="Education" th:selected="${selectedEduType == 'Education'}">School Education</option>
                    <option value="NonSchoolEdu" th:selected="${selectedEduType == 'NonSchoolEdu'}">Non-School Education</option>
                </select>

                <!-- Only show the rest of the filters if Education Type is chosen -->
                <div th:if="${selectedEduType != null and selectedEduType != 'none'}">
                    <label for="targetStatus">Indigenous Status:</label>
                    <select name="targetStatus" id="targetStatus">
                        <option value="none" th:selected="${selectedStatus == null or selectedStatus == 'none'}">-- Select Status --</option>
                        <th:block th:each="status : ${statusList}">
                            <option th:value="${status.statusID}"
                                    th:text="${status.statusName}"
                                    th:selected="${status.statusID == selectedStatus}"></option>
                        </th:block>
                    </select>
                    <label for="targetAge">Age Group:</label>
                    <select name="targetAge" id="targetAge">
                        <option value="none" th:selected="${selectedAge == null or selectedAge == 'none'}">-- Select Age --</option>
                        <th:block th:each="age : ${ages}">
                            <option th:value="${age.ageID}"
                                    th:text="${age.ageStart == 65} ? ${age.ageStart} + ' and over' : ${age.ageStart} + ' - ' + ${age.ageEnd}"
                                    th:selected="${selectedAge != null and selectedAge != 'none' and age.ageID == selectedAge}"></option>
                        </th:block>
                    </select>
                    <label for="targetGender">Gender:</label>
                    <select name="targetGender" id="targetGender">
                        <option value="none" th:selected="${selectedGender == null or selectedGender == 'none'}">-- Select Gender --</option>
                        <th:block th:each="gender : ${genders}">
                            <option th:value="${gender.sexID}"
                                    th:text="${gender.sex}"
                                    th:selected="${gender.sexID == selectedGender}"></option>
                        </th:block>
                    </select>
                    <!-- Education Level/Non-School Degree only appears when Education Type is chosen -->
                    <div th:if="${selectedEduType == 'Education'}">
                        <label for="targetEduLevel">Education Level:</label>
                        <select name="targetEduLevel" id="targetEduLevel">
                            <option value="none" th:selected="${selectedEduLevel == null or selectedEduLevel == 'none'}">-- Select Level --</option>
                            <th:block th:each="edu : ${educationLevels}">
                                <option th:value="${edu.levelID}"
                                        th:text="${edu.level}"
                                        th:selected="${edu.levelID == selectedEduLevel}"></option>
                            </th:block>
                        </select>
                    </div>
                    <div th:if="${selectedEduType == 'NonSchoolEdu'}">
                        <label for="targetEduLevel">Non-School Degree:</label>
                        <select name="targetEduLevel" id="targetEduLevel">
                            <option value="none" th:selected="${selectedEduLevel == null or selectedEduLevel == 'none'}">-- Select Degree --</option>
                            <th:block th:each="ns : ${nonSchoolLevels}">
                                <option th:value="${ns.dCID}"
                                        th:text="${ns.name}"
                                        th:selected="${ns.dCID == selectedEduLevel}"></option>
                            </th:block>
                        </select>
                    </div>
                    <button type="submit">Filter</button>
                </div>
            </form>
        </div>

        <div>
            <h2>Education Data</h2>
            <div th:if="${eduList == null or eduList.isEmpty()}">
                <p>Please select all mandatory filters and click Filter to view education data.</p>
            </div>
            <div th:if="${eduList != null and !eduList.isEmpty()}">
                <table border="1" cellpadding="6" cellspacing="0">
                    <thead>
                        <tr>
                            <th>LGA Name</th>
                            <th>Sex</th>
                            <th>Status</th>
                            <th th:text="${selectedEduType == 'Education'} ? 'Education Level' : 'Non-School Degree'"></th>
                            <th>Population Value</th>
                        </tr>
                    </thead>
                    <tbody>
                        <th:block th:each="e : ${eduList}">
                            <tr>
                                <td th:text="${e.lgaName}"></td>
                                <td th:text="${e.sex}"></td>
                                <td th:text="${e.status}"></td>
                                <td th:text="${e.disease}"></td>
                                <td th:text="${e.populationValue}"></td>
                            </tr>
                        </th:block>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
    <div class='footer'>
        <p>COSC3056 - Studio Project Starter Code</p>
    </div>
</body>
</html>
