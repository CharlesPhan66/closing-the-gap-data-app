<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Our Mission</title>
        <link rel="stylesheet" type = "text/css" href="common.css">
    </head>

    <body>
    <div class='topbar' style="justify-content: center;">
        <div class='topbar-left'>
            <a href='/' class='home-link'>
                <img src='CtGLogo.png' class='top-image logo-main' alt='Logo'>
                <img src='handshake_icon.png' class='top-image logo-handshake' alt='Partnership'>
                <img src='logo.png' class='top-image logo-rmit' alt='RMIT logo'>
                <span class='site-title'></span>
            </a>
        </div>
    </div>

    <div class='topnav'>
        <a href='/'>Homepage</a>
        <a href='mission.html' class='active'>Our Mission</a>
        <a href='page2A.html'>Age and Health Conditions</a>
        <a href='page2B.html'>School and Non-School Completion</a>
        <a href='page3A.html'>Status Gap</a>
        <a href='page3B.html'>LGA Similarity</a>
    </div>

    <div class="header">
        <h1>Subtask 1.B</h1>
    </div>
    <div class="content">
        <h2>List of Priorities</h2>
        <div class="horizontal-container">
            <div th:each="priority : ${priorities}" class="themed-card">
                <p th:text="${priority.description}"></p>
            </div>
        </div>

        <h2 style="margin-top: 20px;">List of Members</h2>
        <div class="horizontal-container">
            <div th:each="member : ${members}" class="themed-card">
                <p th:text="${member.name + ' (' + member.code + ')'}"></p>
            </div>
        </div>

        <h2 style="margin-top: 20px;">Persona Information</h2>
        <div class="horizontal-container" th:if="${persona != null and not #lists.isEmpty(persona) and #lists.size(persona) > 1}" th:with="p=${persona[1]}">
            <div class="themed-card">
                <p><strong>Quote:</strong> "<span th:text="${p.quote}"></span>"</p>
            </div>
            <div class="themed-card">
                <p><strong>Background:</strong> <span th:text="${p.background}"></span></p>
            </div>
            <div class="themed-card">
                <p><strong>Needs & Goals:</strong> <span th:text="${p.needs_goals}"></span></p>
            </div>
            <div class="themed-card">
                <p><strong>Pain Points:</strong> <span th:text="${p.pain_points}"></span></p>
            </div>
            <div class="themed-card">
                <p><strong>Skills & Experience:</strong> <span th:text="${p.skills_experience}"></span></p>
            </div>
        </div>
     </div>
    <div class="footer">
        <p>COSC3056</p>
    </div>
    
</html>
