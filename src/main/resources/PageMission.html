<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Our Mission</title>
        <link rel="stylesheet" type = "text/css" href="common.css">
    </head>

    <body>
    <div class='topbar' style="justify-content: center;">
        <div class='topbar-left'>
            <a href='/' class='home-link'>
                <img src='CtGLogo.png' class='top-image logo-main' alt='Logo'>
                <img src='handshake_icon.png' class='top-image logo-handshake' alt='Partnership'>
                <img src='logo.png' class='top-image logo-rmit' alt='RMIT logo'>
                <span class='site-title'></span>
            </a>
        </div>
    </div>

    <div class='topnav'>
        <a href='/'>Homepage</a>
        <a href='mission.html' class='active'>Our Mission</a>
        <a href='page2A.html'>Age and Health Conditions</a>
        <a href='page2B.html'>School and Non-School Completion</a>
        <a href='page3A.html'>Status Gap</a>
        <a href='page3B.html'>LGA Similarity</a>
    </div>

    <div class="header">
        <h1>Subtask 1.B</h1>
    </div>
    <div class="content">
        <h2>List of Priorities</h2>
        <ul>
            <th:block th:each="priorities : ${priorities}">
                <li th:text="${priorities.description}"></li>
            </th:block>
        </ul>
        <h2>List of Members</h2>
        <ul>
            <th:block th:each="member : ${members}">
                <li th:text="${member.name + ' (' + member.code + ')'}"></li>
            </th:block>
        </ul>
        <h2>Persona Information</h2>
        <ul>
            <th:block th:each="persona, iterStat : ${persona}">
                <li th:if="${iterStat.index == 1}" th:text="${persona.quote}"></li>
                <li th:if="${iterStat.index == 1}" th:text="${persona.background}"></li>
                <li th:if="${iterStat.index == 1}" th:text="${persona.needs_goals}"></li>
                <li th:if="${iterStat.index == 1}" th:text="${persona.pain_points}"></li>
                <li th:if="${iterStat.index == 1}" th:text="${persona.skills_experience}"></li>
            </th:block>
        </ul>
     </div>
    <div class="footer">
        <p>COSC3056</p>
    </div>
    
</html>
